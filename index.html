<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 연락 가능 시간</title>
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-md: rgba(0,0,0,0.14);
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-muted: #a0a09c;
    --avail-bg: #E1F5EE;
    --avail-fill: #5DCAA5;
    --avail-border: #1D9E75;
    --avail-text: #085041;
    --unavail-bg: #FCEBEB;
    --unavail-fill: #F09595;
    --unavail-border: #E24B4A;
    --unavail-text: #791F1F;
    --night-bg: #f0efe9;
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
  }
  header {
    max-width: 900px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 20px; font-weight: 600; letter-spacing: -.02em; }
  header p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
  .legend { display: flex; gap: 14px; align-items: center; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
  .leg-box { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
  .main { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
  }
  .card-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1.1rem; flex-wrap: wrap;
  }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .member-info { flex: 1; }
  .member-name { font-size: 14px; font-weight: 600; }
  .member-role { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .mode-wrap { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .mode-toggle {
    display: flex; border: 1px solid var(--border-md);
    border-radius: var(--radius-sm); overflow: hidden;
  }
  .mode-btn {
    font-size: 12px; padding: 5px 13px; cursor: pointer;
    background: var(--surface); color: var(--text-secondary);
    border: none; font-family: var(--font); transition: background .12s, color .12s;
  }
  .mode-btn.act-avail { background: var(--avail-bg); color: var(--avail-text); font-weight: 600; }
  .mode-btn.act-unavail { background: var(--unavail-bg); color: var(--unavail-text); font-weight: 600; }
  .drag-hint { font-size: 11px; color: var(--text-muted); }
  .grid-scroll { overflow-x: auto; }
  .grid-inner { min-width: 600px; }
  .hour-row {
    display: flex; padding-left: 32px; margin-bottom: 4px;
  }
  .h-lbl {
    flex: 1; font-size: 10px; color: var(--text-muted);
    text-align: center; user-select: none;
  }
  .day-row { display: flex; align-items: center; margin-bottom: 3px; }
  .day-lbl {
    width: 32px; font-size: 11px; color: var(--text-secondary);
    text-align: center; flex-shrink: 0; user-select: none;
  }
  .cells { display: flex; gap: 1.5px; flex: 1; }
  .cell {
    height: 22px; border-radius: 2px; flex: 1; min-width: 0;
    cursor: pointer; transition: opacity .07s;
    border: 1px solid var(--border);
    background: var(--bg);
    -webkit-user-select: none; user-select: none;
  }
  .cell.night { background: var(--night-bg); }
  .cell.s-available { background: var(--avail-fill); border-color: var(--avail-border); }
  .cell.s-unavailable { background: var(--unavail-fill); border-color: var(--unavail-border); }
  .cell:hover { opacity: .72; }
  .summary {
    display: flex; flex-wrap: wrap; gap: 5px;
    margin-top: 0.9rem; min-height: 26px;
  }
  .pill {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    border: 1px solid; white-space: nowrap;
  }
  .pill-avail { background: var(--avail-bg); border-color: var(--avail-border); color: var(--avail-text); }
  .pill-unavail { background: var(--unavail-bg); border-color: var(--unavail-border); color: var(--unavail-text); }
  .pill-empty { background: var(--bg); border-color: var(--border-md); color: var(--text-muted); }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 0.8rem; flex-wrap: wrap; gap: 8px;
  }
  .btn {
    font-size: 12px; padding: 5px 12px;
    border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
    transition: background .1s;
  }
  .btn:hover { background: var(--bg); }
  .btn-save {
    background: var(--text-primary); color: var(--bg);
    border-color: var(--text-primary); font-weight: 600;
  }
  .btn-save:hover { opacity: .85; background: var(--text-primary); }
  .save-status { font-size: 12px; }
  .status-saving { color: var(--text-muted); }
  .status-saved  { color: var(--avail-text); }
  .status-error  { color: var(--unavail-text); }
  .export-area {
    max-width: 900px; margin: 1.5rem auto 0;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .btn-export {
    font-size: 13px; padding: 8px 18px;
    border: 1px solid var(--border-md); border-radius: var(--radius-md);
    background: var(--surface); color: var(--text-primary);
    cursor: pointer; font-family: var(--font); font-weight: 500;
    transition: background .1s;
  }
  .btn-export:hover { background: var(--bg); }
  #export-out {
    max-width: 900px; margin: 1rem auto 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
    display: none;
  }
  #export-out h3 { font-size: 14px; font-weight: 600; margin-bottom: 0.75rem; }
  #export-out pre {
    font-size: 12px; line-height: 1.7; white-space: pre-wrap;
    font-family: 'SF Mono', 'Menlo', monospace;
    color: var(--text-secondary);
    background: var(--bg); padding: 1rem; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .copy-btn {
    font-size: 12px; padding: 4px 12px; margin-top: 8px;
    border: 1px solid var(--border-md); border-radius: var(--radius-sm);
    background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: var(--font);
  }
  .copy-btn:hover { background: var(--bg); }
  .section-divider {
    max-width: 900px; margin: 0 auto 0.5rem;
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    letter-spacing: .06em; text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>팀 연락 가능 시간</h1>
    <p>셀을 클릭하거나 드래그해서 시간대를 설정하세요</p>
  </div>
  <div class="legend">
    <span class="leg"><span class="leg-box" style="background:var(--avail-fill);border:1px solid var(--avail-border)"></span>연락 가능</span>
    <span class="leg"><span class="leg-box" style="background:var(--unavail-fill);border:1px solid var(--unavail-border)"></span>연락 불가</span>
    <span class="leg"><span class="leg-box" style="background:var(--night-bg);border:1px solid var(--border-md)"></span>새벽 (0~5시, 22~23시)</span>
  </div>
</header>

<div class="main" id="cards"></div>

<div class="export-area">
  <button class="btn-export" onclick="buildExport()">결과 텍스트로 내보내기</button>
  <button class="btn-export" onclick="resetAll()">전체 초기화</button>
</div>
<div id="export-out">
  <h3>복사해서 노션에 붙여넣기</h3>
  <pre id="export-pre"></pre>
  <button class="copy-btn" onclick="copyExport()">클립보드에 복사</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyDm5DpKxyiConsTqYyVKXf1ETapiVZCTQo",
  authDomain: "teampage-67e1b.firebaseapp.com",
  databaseURL: "https://teampage-67e1b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "teampage-67e1b",
  storageBucket: "teampage-67e1b.firebasestorage.app",
  messagingSenderId: "172635325275",
  appId: "1:172635325275:web:9bf82069725b0ad672107e"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const HOURS = Array.from({length:24},(_,i)=>i);
const DAYS = ['월','화','수','목','금','토','일'];
const NIGHT = new Set([0,1,2,3,4,5,22,23]);
const AVATARS = [
  {bg:'#E1F5EE',color:'#085041'},
  {bg:'#E6F1FB',color:'#0C447C'},
  {bg:'#EEEDFE',color:'#3C3489'},
  {bg:'#FAEEDA',color:'#633806'},
];

const members = [
  {id:0, name:'김우태', role:'개발'},
  {id:1, name:'유규하', role:'개발'},
  {id:2, name:'문현승', role:'개발'},
  {id:3, name:'이주노', role:'개발'},
];

const state = {};
const modes = {};
members.forEach(m => {
  modes[m.id] = 'available';
  state[m.id] = {};
  DAYS.forEach(d => { state[m.id][d] = {}; HOURS.forEach(h => state[m.id][d][h]='neutral'); });
});

let drag = false, dragMid = -1, dragVal = 'neutral';
let remoteUpdate = false;

function pad(n){ return String(n).padStart(2,'0'); }
function initials(n){ const p=n.split(' '); return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.slice(0,2).toUpperCase(); }

function getDayStr(mid, type, day){
  const hrs = HOURS.filter(h => state[mid][day][h]===type);
  if(!hrs.length) return '';
  const segs = [];
  let s=hrs[0], p=hrs[0];
  for(let i=1;i<hrs.length;i++){
    if(hrs[i]===p+1){ p=hrs[i]; }
    else { segs.push(`${pad(s)}:00~${pad(p+1)}:00`); s=hrs[i]; p=hrs[i]; }
  }
  segs.push(`${pad(s)}:00~${pad(p+1)}:00`);
  return segs.join(', ');
}

function getRanges(mid, type){
  const dayStr = {};
  DAYS.forEach(d => { dayStr[d] = getDayStr(mid, type, d); });
  const out = [];
  let i = 0;
  while(i < DAYS.length){
    const d = DAYS[i];
    if(!dayStr[d]){ i++; continue; }
    let j = i + 1;
    while(j < DAYS.length && dayStr[DAYS[j]] === dayStr[d]) j++;
    const span = j - i;
    const dayLabel = span === 1 ? d : span === 2 ? `${d}·${DAYS[j-1]}` : `${d}~${DAYS[j-1]}`;
    out.push(`${dayLabel} ${dayStr[d]}`);
    i = j;
  }
  return out;
}

function applyCell(mid, day, hour, val, skipRender){
  state[mid][day][hour] = val;
  const el = document.querySelector(`[data-k="${mid}_${day}_${hour}"]`);
  if(!el) return;
  el.className = 'cell' + (NIGHT.has(hour)?' night':'') + (val==='neutral'?'':(` s-${val}`));
  if(!skipRender) renderSummary(mid);
}

function renderSummary(mid){
  const el = document.getElementById(`sum-${mid}`);
  if(!el) return;
  const av = getRanges(mid,'available');
  const un = getRanges(mid,'unavailable');
  let h = av.map(t=>`<span class="pill pill-avail">${t}</span>`).join('')
         + un.map(t=>`<span class="pill pill-unavail">${t}</span>`).join('');
  el.innerHTML = h || '<span class="pill pill-empty">아직 설정 없음</span>';
}

function setSaveStatus(mid, status){
  const el = document.getElementById(`save-status-${mid}`);
  if(!el) return;
  const map = {
    idle:    {text:'', cls:''},
    saving:  {text:'저장 중...', cls:'status-saving'},
    saved:   {text:'저장됨', cls:'status-saved'},
    error:   {text:'오류 발생', cls:'status-error'},
    loading: {text:'불러오는 중...', cls:'status-saving'},
  };
  const s = map[status] || map.idle;
  el.textContent = s.text;
  el.className = 'save-status ' + s.cls;
}

async function saveMember(mid){
  setSaveStatus(mid, 'saving');
  try {
    await set(ref(db, `availability/${mid}`), state[mid]);
    setSaveStatus(mid, 'saved');
    setTimeout(() => setSaveStatus(mid, 'idle'), 2000);
  } catch(e){
    setSaveStatus(mid, 'error');
  }
}

function loadAll(){
  members.forEach(m => {
    setSaveStatus(m.id, 'loading');
    onValue(ref(db, `availability/${m.id}`), snap => {
      const data = snap.val();
      setSaveStatus(m.id, 'idle');
      if(!data) return;
      remoteUpdate = true;
      DAYS.forEach(d => {
        HOURS.forEach(h => {
          const val = (data[d] && data[d][h]) ? data[d][h] : 'neutral';
          state[m.id][d][h] = val;
          applyCell(m.id, d, h, val, true);
        });
      });
      renderSummary(m.id);
      remoteUpdate = false;
    });
  });
}

function toggleMode(mid, mode){
  modes[mid] = mode;
  document.querySelectorAll(`.mode-btn[data-mid="${mid}"]`).forEach(b => {
    b.className = 'mode-btn' + (b.dataset.mode===mode ? (mode==='available'?' act-avail':' act-unavail') : '');
  });
}

function clearMember(mid){
  DAYS.forEach(d => HOURS.forEach(h => applyCell(mid,d,h,'neutral')));
}

function resetAll(){ members.forEach(m => clearMember(m.id)); }

function buildExport(){
  let lines = [];
  lines.push('팀 연락 가능 시간');
  lines.push('='.repeat(28));
  members.forEach(m => {
    const av = getRanges(m.id,'available');
    const un = getRanges(m.id,'unavailable');
    lines.push('');
    lines.push(`▸ ${m.name}  (${m.role})`);
    lines.push(`  연락 가능 : ${av.length ? av.join(', ') : '미설정'}`);
    lines.push(`  연락 불가 : ${un.length ? un.join(', ') : '미설정'}`);
  });
  const out = document.getElementById('export-out');
  document.getElementById('export-pre').textContent = lines.join('\n');
  out.style.display = 'block';
  out.scrollIntoView({behavior:'smooth'});
}

function copyExport(){
  const txt = document.getElementById('export-pre').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '복사됨!';
    setTimeout(()=>btn.textContent='클립보드에 복사', 1500);
  });
}

function render(){
  const container = document.getElementById('cards');
  container.innerHTML = members.map(m => {
    const av = AVATARS[m.id % AVATARS.length];
    const hdrLabels = HOURS.map(h =>
      `<div class="h-lbl">${h%6===0?pad(h)+'시':''}</div>`
    ).join('');
    const rows = DAYS.map(d =>
      `<div class="day-row">
        <span class="day-lbl">${d}</span>
        <div class="cells">${HOURS.map(h =>
          `<div class="cell${NIGHT.has(h)?' night':''}" data-k="${m.id}_${d}_${h}"
            onmousedown="dragStart(event,${m.id},'${d}',${h})"
            onmouseenter="dragMove(${m.id},'${d}',${h})"
            ontouchstart="dragStart(event,${m.id},'${d}',${h})"
          ></div>`
        ).join('')}</div>
      </div>`
    ).join('');

    return `<div class="card">
      <div class="card-header">
        <div class="avatar" style="background:${av.bg};color:${av.color}">${initials(m.name)}</div>
        <div class="member-info">
          <div class="member-name">${m.name}</div>
          <div class="member-role">${m.role}</div>
        </div>
        <div class="mode-wrap">
          <div class="mode-toggle">
            <button class="mode-btn act-avail" data-mid="${m.id}" data-mode="available" onclick="toggleMode(${m.id},'available')">연락 가능</button>
            <button class="mode-btn" data-mid="${m.id}" data-mode="unavailable" onclick="toggleMode(${m.id},'unavailable')">연락 불가</button>
          </div>
          <span class="drag-hint">드래그로 여러 칸 선택 가능</span>
        </div>
      </div>
      <div class="grid-scroll"><div class="grid-inner">
        <div class="hour-row">${hdrLabels}</div>
        ${rows}
      </div></div>
      <div class="summary" id="sum-${m.id}"><span class="pill pill-empty">아직 설정 없음</span></div>
      <div class="card-footer">
        <div style="display:flex;align-items:center;gap:10px">
          <span class="save-status" id="save-status-${m.id}"></span>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="clearMember(${m.id})">초기화</button>
          <button class="btn btn-save" onclick="saveMember(${m.id})">저장</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function dragStart(e, mid, day, hour){
  if(remoteUpdate) return;
  drag=true; dragMid=mid;
  const cur=state[mid][day][hour], mode=modes[mid];
  dragVal = cur===mode ? 'neutral' : mode;
  applyCell(mid,day,hour,dragVal);
  e.preventDefault();
}

function dragMove(mid, day, hour){
  if(!drag||dragMid!==mid) return;
  applyCell(mid,day,hour,dragVal);
}

document.addEventListener('touchmove', e=>{
  if(!drag) return;
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  if(el&&el.dataset.k){
    const [m,d,h]=el.dataset.k.split('_');
    if(parseInt(m)===dragMid) applyCell(dragMid,d,parseInt(h),dragVal);
  }
  e.preventDefault();
},{passive:false});

document.addEventListener('mouseup',()=>{drag=false;dragMid=-1;});
document.addEventListener('touchend',()=>{drag=false;dragMid=-1;});

window.toggleMode = toggleMode;
window.clearMember = clearMember;
window.saveMember = saveMember;
window.resetAll = resetAll;
window.buildExport = buildExport;
window.copyExport = copyExport;
window.dragStart = dragStart;
window.dragMove = dragMove;

render();
loadAll();
</script>
</body>
</html>
